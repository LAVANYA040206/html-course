apiVersion: apps/v1
kind: Deployment
metadata:
  name: html-course
spec:
  replicas: 2
  selector:
    matchLabels:
      app: html-course
  template:
    metadata:
      labels:
        app: html-course
    spec:
      containers:
        - name: html-course
          image: lavanya040206/html-course:latest   
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: html-course-service
spec:
  type: NodePort
  selector:
    app: html-course
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30007